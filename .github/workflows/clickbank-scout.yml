name: ClickBank Scout

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  MAKE_WEBHOOK: https://hook.eu1.make.com/882803j9m5617e1ozp7jhuviicsrpjeb

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ClickBank Top Products and Push to Make.com
        env:
          CLICKBANK_AUTH: ${{ secrets.CLICKBANK_AUTH }}
        run: |
          node << 'NODEEOF'
          const https = require('https');

          const makeReq = (opts, body) => new Promise((res, rej) => {
            const req = https.request(opts, r => {
              let d = '';
              r.on('data', c => d += c);
              r.on('end', () => res({ status: r.statusCode, ct: r.headers['content-type'] || '', body: d }));
            });
            req.on('error', rej);
            if (body) req.write(body);
            req.end();
          });

          (async () => {
            const authKey = process.env.CLICKBANK_AUTH || '';
            const headers = { 'Accept': 'application/json' };
            if (authKey) headers['Authorization'] = authKey;

            console.log('Auth configured:', !!authKey);
            console.log('Calling api.clickbank.com/rest/1.3/marketplace/search...');

            const r = await makeReq({
              hostname: 'api.clickbank.com',
              path: '/rest/1.3/marketplace/search?sortField=GRAVITY&sortDescending=1&perPage=50',
              method: 'GET',
              headers
            });

            console.log('Status:', r.status, '| Content-Type:', r.ct);
            console.log('Body preview:', r.body.slice(0, 300));

            if (r.status !== 200 || !r.ct.includes('json')) {
              console.log('');
              if (!authKey) {
                console.log('=== SETUP REQUIRED ===');
                console.log('Add GitHub Secret CLICKBANK_AUTH with value:');
                console.log('  DEV_API_KEY:CLERK_API_KEY');
                console.log('Get keys at: ClickBank account > Settings > API Settings');
                console.log('======================');
              } else {
                console.log('ERROR: Auth failed. Check CLICKBANK_AUTH secret format.');
                console.log('Expected: DEV_API_KEY:CLERK_API_KEY');
                process.exit(1);
              }
              process.exit(0);
            }

            const parsed = JSON.parse(r.body);
            const raw = parsed.results || parsed.products || parsed.hits || [];
            const products = raw.map(p => ({
              site: p.site || p.nickname || p.vendorNickname || '',
              title: p.title || p.name || '',
              description: p.description || '',
              marketplaceStats: {
                gravity: parseFloat(p.gravity || p.popularityRank || 0),
                averageDollarsPerSale: parseFloat(p.averageDollarsPerSale || p.dollarsSale || 0),
                category: p.category || ''
              }
            }));

            console.log('Fetched', products.length, 'products from ClickBank');
            if (!products.length) { console.log('No products returned.'); process.exit(0); }

            const payload = JSON.stringify({ products });
            const webhook = process.env.MAKE_WEBHOOK;
            const makeResp = await makeReq({
              hostname: 'hook.eu1.make.com',
              path: '/' + webhook.split('/').pop(),
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
            }, payload);

            console.log('Make.com:', makeResp.status, makeResp.body);
          })();
          NODEEOF
