name: ClickBank Scout

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  MAKE_WEBHOOK: https://hook.eu1.make.com/882803j9m5617e1ozp7jhuviicsrpjeb

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ClickBank Top Products and Push to Make.com
        env:
          CLICKBANK_AUTH: ${{ secrets.CLICKBANK_AUTH }}
        run: |
          node << 'NODEEOF'
          const https = require('https');

          const makeReq = (opts, body) => new Promise((res, rej) => {
            const req = https.request(opts, r => {
              let d = '';
              r.on('data', c => d += c);
              r.on('end', () => res({ status: r.statusCode, ct: r.headers['content-type'] || '', body: d }));
            });
            req.on('error', rej);
            if (body) req.write(body);
            req.end();
          });

          (async () => {
            const rawKey = process.env.CLICKBANK_AUTH || '';

            // Test 1: ohne Auth (public access?)
            console.log('--- TEST 1: No Auth ---');
            const r1 = await makeReq({
              hostname: 'api.clickbank.com',
              path: '/rest/1.3/marketplace/search?sortField=GRAVITY&sortDescending=1&perPage=5',
              method: 'GET',
              headers: { 'Accept': 'application/json' }
            });
            console.log('Status:', r1.status, '| CT:', r1.ct);
            console.log('Body:', r1.body.slice(0, 300));

            // Test 2: mit DEV_KEY: format
            if (rawKey) {
              console.log('--- TEST 2: With DEV_KEY: format ---');
              const r2 = await makeReq({
                hostname: 'api.clickbank.com',
                path: '/rest/1.3/marketplace/search?sortField=GRAVITY&sortDescending=1&perPage=5',
                method: 'GET',
                headers: { 'Accept': 'application/json', 'Authorization': rawKey + ':' }
              });
              console.log('Status:', r2.status, '| CT:', r2.ct);
              console.log('Body:', r2.body.slice(0, 300));

              // Test 3: mit raw key
              console.log('--- TEST 3: With raw key only ---');
              const r3 = await makeReq({
                hostname: 'api.clickbank.com',
                path: '/rest/1.3/marketplace/search?sortField=GRAVITY&sortDescending=1&perPage=5',
                method: 'GET',
                headers: { 'Accept': 'application/json', 'Authorization': rawKey }
              });
              console.log('Status:', r3.status, '| CT:', r3.ct);
              console.log('Body:', r3.body.slice(0, 300));
            }
          })();
          NODEEOF
