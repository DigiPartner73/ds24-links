name: ClickBank Scout

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  MAKE_WEBHOOK: https://hook.eu1.make.com/882803j9m5617e1ozp7jhuviicsrpjeb

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ClickBank Top Products and Push to Make.com
        env:
          CLICKBANK_AUTH: ${{ secrets.CLICKBANK_AUTH }}
        run: |
          node << 'NODEEOF'
          const https = require('https');

          const makeReq = (opts, body) => new Promise((res, rej) => {
            const req = https.request(opts, r => {
              let d = '';
              r.on('data', c => d += c);
              r.on('end', () => res({ status: r.statusCode, ct: r.headers['content-type'] || '', body: d }));
            });
            req.on('error', rej);
            if (body) req.write(body);
            req.end();
          });

          (async () => {
            const rawKey = process.env.CLICKBANK_AUTH || '';
            console.log('Auth key present:', !!rawKey);

            // ClickBank v1.3 erwartet DEV_KEY:CLERK_KEY — wenn nur DEV_KEY vorhanden, Doppelpunkt anhängen
            const authHeader = rawKey.includes(':') ? rawKey : (rawKey ? rawKey + ':' : '');

            const headers = { 'Accept': 'application/json' };
            if (authHeader) headers['Authorization'] = authHeader;

            console.log('Calling ClickBank Marketplace API...');

            const r = await makeReq({
              hostname: 'api.clickbank.com',
              path: '/rest/1.3/marketplace/search?sortField=GRAVITY&sortDescending=1&perPage=50',
              method: 'GET',
              headers
            });

            console.log('Status:', r.status, '| Content-Type:', r.ct);
            console.log('Body preview:', r.body.slice(0, 500));

            if (r.status !== 200 || !r.ct.includes('json')) {
              if (!rawKey) {
                console.log('=== SETUP REQUIRED: Add CLICKBANK_AUTH secret ===');
              } else {
                console.log('ERROR: ClickBank API rejected request. Status:', r.status);
                console.log('Try: Account Settings -> API Management -> check key format');
                process.exit(1);
              }
              process.exit(0);
            }

            const parsed = JSON.parse(r.body);
            console.log('Response keys:', Object.keys(parsed).join(', '));

            const raw = parsed.results || parsed.products || parsed.hits || parsed.items || parsed.data || [];
            console.log('Products found:', Array.isArray(raw) ? raw.length : 'not array: ' + typeof raw);

            if (!raw.length) {
              console.log('No products returned. Full response:', r.body.slice(0, 1000));
              process.exit(0);
            }

            const products = raw.map(p => ({
              site: p.site || p.nickname || p.vendorNickname || '',
              title: p.title || p.name || '',
              description: p.description || '',
              marketplaceStats: {
                gravity: parseFloat(p.gravity || p.popularityRank || p.marketplaceStats?.gravity || 0),
                averageDollarsPerSale: parseFloat(p.averageDollarsPerSale || p.dollarsSale || p.marketplaceStats?.averageDollarsPerSale || 0),
                category: p.category || p.marketplaceStats?.category || ''
              }
            }));

            console.log('Sending', products.length, 'products to Make.com...');
            const payload = JSON.stringify({ products });
            const webhook = process.env.MAKE_WEBHOOK;
            const makeResp = await makeReq({
              hostname: 'hook.eu1.make.com',
              path: '/' + webhook.split('/').pop(),
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
            }, payload);

            console.log('Make.com response:', makeResp.status, makeResp.body);
          })();
          NODEEOF
