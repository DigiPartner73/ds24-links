name: ClickBank Scout (SA-01-CB)
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run ClickBank Scout
        run: |
          node <<'SCRIPT'
          const https = require('https');

          function request(hostname, path, method, headers, body) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify(body);
              const options = { hostname, path, method, headers: { ...headers, 'Content-Length': Buffer.byteLength(data) } };
              const req = https.request(options, res => {
                let raw = '';
                res.on('data', c => raw += c);
                res.on('end', () => resolve({ status: res.statusCode, body: raw }));
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }

          async function main() {
            console.log('Fetching ClickBank marketplace products...');

            const gqlResp = await request(
              'accounts.clickbank.com', '/graphql', 'POST',
              {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                'User-Agent': 'Mozilla/5.0 (compatible; DS24-Scout/1.0)'
              },
              {
                query: `query ($parameters: MarketplaceSearchParameters!) {
                  marketplaceSearch(parameters: $parameters) {
                    totalHits
                    hits {
                      site
                      title
                      description
                      marketplaceStats {
                        category
                        gravity
                        averageDollarsPerSale
                        initialDollarsPerSale
                        activateDate
                      }
                    }
                  }
                }`,
                variables: {
                  parameters: {
                    category: null,
                    sortField: 'gravity',
                    sortDescending: true,
                    resultsPerPage: 50,
                    offset: 0,
                    nicknameMasq: null
                  }
                }
              }
            );

            if (gqlResp.status !== 200) {
              throw new Error(`GraphQL failed (${gqlResp.status}): ${gqlResp.body}`);
            }

            const gqlData = JSON.parse(gqlResp.body);
            if (gqlData.errors) {
              throw new Error('GraphQL errors: ' + JSON.stringify(gqlData.errors));
            }

            const hits = gqlData.data.marketplaceSearch.hits || [];
            console.log(`Found ${gqlData.data.marketplaceSearch.totalHits} total, fetched ${hits.length}`);

            // Filter: gravity >= 10 and EPS >= 20
            const filtered = hits.filter(h => {
              const stats = h.marketplaceStats || {};
              return (stats.gravity || 0) >= 10 && (stats.averageDollarsPerSale || 0) >= 20;
            });
            console.log(`After filter (gravity>=10, EPS>=20): ${filtered.length} products`);

            const products = filtered.map(h => {
              const stats = h.marketplaceStats || {};
              return {
                vendor_id: h.site || '',
                title: h.title || '',
                description: (h.description || '').slice(0, 500),
                niche: stats.category || '',
                gravity: Math.round((stats.gravity || 0) * 100) / 100,
                earnings_per_sale: Math.round((stats.averageDollarsPerSale || 0) * 100) / 100,
                initial_dollars_per_sale: Math.round((stats.initialDollarsPerSale || 0) * 100) / 100,
                activate_date: stats.activateDate || '',
                network: 'ClickBank',
                affiliate_url: `https://${h.site}.hop.clickbank.net`
              };
            });

            if (products.length === 0) {
              console.log('No products passed filter — skipping webhook.');
              return;
            }

            const webhookResp = await request(
              'hook.eu1.make.com',
              '/882803j9m5617e1ozp7jhuviicsrpjeb',
              'POST',
              { 'Content-Type': 'application/json' },
              { products }
            );

            console.log(`Webhook response: ${webhookResp.status} ${webhookResp.body}`);
            if (webhookResp.status < 200 || webhookResp.status >= 300) {
              throw new Error(`Webhook failed: ${webhookResp.status}`);
            }
            console.log(`SUCCESS: ${products.length} products sent to Make.com`);
          }

          main().catch(err => { console.error('FAILED:', err.message); process.exit(1); });
          SCRIPT
