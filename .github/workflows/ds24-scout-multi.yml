name: DS24 Scout – Nischen-Strategie (v2)

on:
  schedule:
    - cron: '0 7 * * *'   # täglich 07:00 UTC
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Fetch, Classify & Write DS24 Products
        env:
          DS24_COOKIE: ${{ secrets.DS24_COOKIE }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, math, json, urllib.request, urllib.error

          # ─────────────────────────────────────────────
          # 1. KONFIGURATION
          # ─────────────────────────────────────────────
          DS24_COOKIE     = os.environ["DS24_COOKIE"]
          AIRTABLE_TOKEN  = os.environ["AIRTABLE_TOKEN"]
          AIRTABLE_BASE   = "apppfrE10FwXz9IMY"
          AIRTABLE_TABLE  = "tblm1szgXQZc0mRle"

          MAX_PAGES       = 6      # 6 × 50 = 300 Produkte
          LIMIT_PER_PAGE  = 50
          TOP_N_PER_NICHE = 3      # Top 3 pro Nische

          # ─────────────────────────────────────────────
          # 2. NISCHEN-KEYWORD-MAPPING
          # Priorität: zuerst spezifischere Nischen prüfen
          # ─────────────────────────────────────────────
          NISCHEN_MAP = [
              ("Trading & Crypto",          ["trading", "börse", "aktien", "forex", "crypto", "bitcoin", "krypto", "ethereum", "coin"]),
              ("Social Media & Influencer", ["instagram", "tiktok", "youtube", "facebook", "social media", "influencer", "follower", "reel", "shorts"]),
              ("Email Marketing",           ["email", "newsletter", "mailing", "autoresponder", "klicktipp", "aktivecampaign", "mailchimp"]),
              ("Software & KI",             ["software", "tool", "saas", "ki ", "künstliche intelligenz", "chatgpt", "automation", "wordpress", "app ", "plugin"]),
              ("Health & Fitness",          ["health", "fitness", "gesundheit", "abnehmen", "gewicht", "keto", "diet", "schlank", "yoga", "workout", "detox", "tinnitus", "rücken", "schmerz", "medizin", "heilung", "blut", "herz"]),
              ("Dating & Relationships",    ["dating", "beziehung", "partnerschaft", "flirten", "liebe", "romantik", "frauen", "männer", "verführung", "erotik"]),
              ("Personal Development",      ["mindset", "persönlichkeit", "motivation", "coaching", "nlp", "hypnose", "erfolg", "mindfulness", "potential", "gewohnheit", "subliminal", "denken", "selbst", "charakter"]),
              ("Spirituality",              ["spirituell", "esoterik", "chakra", "energie", "tarot", "astrologie", "bewusstsein", "meditation", "mystik", "magie"]),
              ("Business & Investment",     ["business", "investment", "vermögen", "finanzen", "cash", "money", "geld verdienen", "einkommen", "reich", "passiv", "immobilien"]),
              ("Online Marketing",          ["marketing", "ecommerce", "affiliate", "funnel", "traffic", "copywriting", "werbe", "verkauf", "conversion", "leads", "amazon fba", "shopify", "dropshipping", "e-business", "online business"]),
              ("Education & Courses",       ["lernen", "kurs", "training", "prüfung", "studium", "zertifikat", "nachhilfe", "schule", "abitur"]),
              ("Languages",                 ["sprache", "english", "englisch", "französisch", "spanisch", "sprachkurs", "vokabel"]),
              ("Photography & Film",        ["foto", "film", "video", "kamera", "fotografie", "videografie", "schnitt"]),
              ("Animals & Pets",            ["hund", "katze", "tier", "pet", "pferd", "aquarium", "vogel"]),
              ("Family & Children",         ["familie", "kinder", "eltern", "erziehung", "baby", "schwangerschaft", "scheidung"]),
              ("Food & Cooking",            ["essen", "kochen", "rezept", "backen", "food", "küche", "ernährung", "vegan", "vegetarisch"]),
              ("Hobby & Craft",             ["hobby", "gitarre", "musik instrument", "malen", "zeichnen", "basteln", "kreativ", "kunst", "stricken"]),
              ("Travel",                    ["reise", "travel", "urlaub", "fernweh", "backpacking", "camping"]),
              ("Sport",                     ["sport", "fußball", "tennis", "golf", "laufen", "marathon", "triathlon", "fitness kurs"]),
              ("Home & Garden",             ["haus", "garten", "wohnen", "renovieren", "heimwerk", "deko", "einrichten"]),
              ("Law & Taxes",               ["recht", "anwalt", "steuer", "finanzamt", "gesetz", "mietrecht", "arbeitsrecht"]),
              ("Survival & Prepping",       ["survival", "prepper", "notfall", "bushcraft", "krisenvorsorge"]),
              ("Green & Sustainability",    ["umwelt", "nachhaltig", "bio", "green", "solar", "energie sparen"]),
              ("Betting Systems",           ["wetten", "sportwetten", "lotto", "casino"]),
              ("Fun & Games",               ["spiel", "game", "quiz", "spaß", "gaming"]),
              ("Dancing & Music",           ["tanz", "gitarre", "klavier", "singen", "gesang", "musik machen"]),
              ("Fashion & Style",           ["mode", "fashion", "kleidung", "styling", "outfit"]),
              ("Computer & IT",             ["computer", "internet", "it", "programmieren", "coding", "hacking", "cyber", "web"]),
              ("Profession & Job",          ["karriere", "job", "beruf", "bewerbung", "gehalt", "freelance", "selbständig"]),
              ("Hotels & Gastronomy",       ["hotel", "restaurant", "gastro", "catering"]),
              ("Politics & Economy",        ["politik", "wirtschaft", "demokratie"]),
              ("Fiction & Literature",      ["roman", "buch", "ebook", "fiction", "literatur", "krimi"]),
              ("Sonstige",                  []),   # Fallback
          ]

          def classify_product(label: str, description: str = "") -> str:
              text = (label + " " + description).lower()
              for nische, keywords in NISCHEN_MAP:
                  if any(kw in text for kw in keywords):
                      return nische
              return "Sonstige"

          # ─────────────────────────────────────────────
          # 3. DS24 PRODUKTE LADEN (6 Seiten × 50 = 300)
          # ─────────────────────────────────────────────
          def ds24_fetch(page: int, limit: int = 50) -> list:
              url = f"https://www.digistore24-app.com/v2/api/marketplace/results?limit={limit}&page={page}"
              req = urllib.request.Request(url, headers={
                  "Cookie": f"ds24={DS24_COOKIE}",
                  "Accept": "application/json"
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.loads(r.read())
                      return data.get("result", {}).get("items", [])
              except Exception as e:
                  print(f"  Fehler Seite {page}: {e}")
                  return []

          all_products = []
          for page in range(1, MAX_PAGES + 1):
              items = ds24_fetch(page)
              all_products.extend(items)
              print(f"  Seite {page}: {len(items)} Produkte geladen")
              if len(items) < LIMIT_PER_PAGE:
                  break
              time.sleep(0.5)

          print(f"\nGesamt geladen: {len(all_products)} Produkte")

          # ─────────────────────────────────────────────
          # 4. NISCHEN-KLASSIFIZIERUNG
          # ─────────────────────────────────────────────
          nischen_buckets: dict[str, list] = {}
          for p in all_products:
              nische = classify_product(p.get("label", ""), p.get("description", ""))
              nischen_buckets.setdefault(nische, []).append(p)

          print(f"\nNischen-Verteilung:")
          for n, prods in sorted(nischen_buckets.items(), key=lambda x: -len(x[1])):
              print(f"  {n}: {len(prods)} Produkte")

          # ─────────────────────────────────────────────
          # 5. TOP 3 PRO NISCHE (nach EarningsPerSale)
          # ─────────────────────────────────────────────
          selected = []
          for nische, prods in nischen_buckets.items():
              top = sorted(prods, key=lambda x: x.get("earningsPerSale", 0), reverse=True)[:TOP_N_PER_NICHE]
              for p in top:
                  selected.append({
                      "Produktname":   p.get("label", ""),
                      "Kategorie":     nische,
                      "Vendor":        str(p.get("vendorId", "")),
                      "EarningsPerSale": round(p.get("earningsPerSale", 0), 2),
                      "Ranking":       str(p.get("salesRank", "")),
                      "Affiliate_Link_Raw": f"https://www.digistore24.com/redir/{p.get('productId', '')}/info2641/" if p.get('productId') else "",
                      "Status":        "neu_geladen",
                      "Plattform":     "Digistore24",
                      "Sprache":       "DE",
                      "Letzter_Agent": "SA-01-DS24-Multi",
                  })

          print(f"\nAusgewählt: {len(selected)} Produkte ({TOP_N_PER_NICHE} pro Nische)")

          # ─────────────────────────────────────────────
          # 6. AIRTABLE: BESTEHENDE LINKS LADEN (Dedup)
          # ─────────────────────────────────────────────
          def airtable_get(url: str) -> dict:
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {AIRTABLE_TOKEN}",
                  "Accept": "application/json"
              })
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          existing_links = set()
          offset = None
          while True:
              url = f"https://api.airtable.com/v0/{AIRTABLE_BASE}/{AIRTABLE_TABLE}?fields[]=Affiliate_Link_Raw&pageSize=100"
              if offset:
                  url += f"&offset={offset}"
              data = airtable_get(url)
              for rec in data.get("records", []):
                  link = rec.get("fields", {}).get("Affiliate_Link_Raw", "")
                  if link:
                      existing_links.add(link.strip())
              offset = data.get("offset")
              if not offset:
                  break
              time.sleep(0.2)

          print(f"\nBestehende Links in Airtable: {len(existing_links)}")

          # ─────────────────────────────────────────────
          # 7. NEUE PRODUKTE FILTERN
          # ─────────────────────────────────────────────
          new_products = [
              p for p in selected
              if p["Affiliate_Link_Raw"] and p["Affiliate_Link_Raw"].strip() not in existing_links
          ]
          print(f"Neue Produkte (noch nicht in Airtable): {len(new_products)}")

          # ─────────────────────────────────────────────
          # 8. IN AIRTABLE SCHREIBEN (Batch à 10)
          # ─────────────────────────────────────────────
          def airtable_create_batch(records: list) -> int:
              payload = json.dumps({"records": [{"fields": r} for r in records]}).encode()
              req = urllib.request.Request(
                  f"https://api.airtable.com/v0/{AIRTABLE_BASE}/{AIRTABLE_TABLE}",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {AIRTABLE_TOKEN}",
                      "Content-Type": "application/json"
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      result = json.loads(r.read())
                      return len(result.get("records", []))
              except urllib.error.HTTPError as e:
                  print(f"  Airtable Fehler {e.code}: {e.read().decode()}")
                  return 0

          created = 0
          batch_size = 10
          for i in range(0, len(new_products), batch_size):
              batch = new_products[i:i + batch_size]
              n = airtable_create_batch(batch)
              created += n
              print(f"  Batch {i//batch_size + 1}: {n} Records erstellt")
              time.sleep(0.3)

          print(f"\n✅ Fertig: {created} neue Produkte in Airtable geschrieben")
          if not new_products:
              print("ℹ️  Alle Top-Produkte sind bereits in Airtable — kein Handlungsbedarf")

          PYEOF
