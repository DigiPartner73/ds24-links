name: Generate Bridge Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'p/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Generate Bridge Pages from Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python3 .github/scripts/gen_bridge_pages.py

      - name: Commit and push bridge pages
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add p/
          if git diff --staged --quiet; then
            echo "No changes -- all bridge pages up to date."
          else
            PAGES=$(git diff --staged --name-only | grep -c '\.html$' || true)
            git commit -m "chore: auto-generate ${PAGES} bridge page(s) [skip ci]"
            git push
          fi
