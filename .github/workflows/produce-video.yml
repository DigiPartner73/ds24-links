name: DS24 - Produce Video v10

on:
  repository_dispatch:
    types: [produce-video]
  workflow_dispatch:
    inputs:
      record_id:
        description: "Airtable Record ID (optional)"
        required: false
        default: ""

concurrency:
  group: produce-video
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install requests --quiet

      - name: Produce video
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCED_RECORD_ID: ${{ github.event.client_payload.record_id || github.event.inputs.record_id || '' }}
        run: |
          python3 scripts/produce_video.py
