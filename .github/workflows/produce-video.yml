name: DS24 - Produce Video (gTTS + PIL Gradient + FFmpeg)

# Pipeline: gTTS -> PIL Dark Gradient -> FFmpeg Ken Burns -> GitHub Release
# Keys: Nur AIRTABLE_TOKEN + GITHUB_TOKEN (kein externer TTS/Image-Key noetig)
# Status-Kette: skript_fertig -> video_processing -> video_fertig

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      record_id:
        description: 'Airtable Record ID (optional)'
        required: false
  repository_dispatch:
    types: [produce-video]

permissions:
  contents: write

concurrency:
  group: produce-video
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install deps
        run: |
          sudo apt-get install -y ffmpeg fonts-liberation
          pip install requests pillow gtts --quiet

      - name: Produce video
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCED_RECORD_ID: ${{ github.event.client_payload.record_id || github.event.inputs.record_id || '' }}
        run: |
          python3 << 'PYEOF'
          import requests, os, sys, subprocess, time, textwrap, math
          from gtts import gTTS
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          AT_TOKEN  = os.environ['AIRTABLE_TOKEN']
          GH_TOKEN  = os.environ['GH_TOKEN']
          FORCED_ID = os.environ.get('FORCED_RECORD_ID', '').strip()
          BASE_ID   = 'apppfrE10FwXz9IMY'
          TABLE_ID  = 'tblm1szgXQZc0mRle'
          REPO      = 'DigiPartner73/ds24-links'
          AT_H = {'Authorization': f'Bearer {AT_TOKEN}', 'Content-Type': 'application/json'}
          GH_H = {'Authorization': f'token {GH_TOKEN}', 'Accept': 'application/vnd.github.v3+json'}

          def at_patch(rec_id, fields):
              return requests.patch(
                  f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}/{rec_id}',
                  headers=AT_H, json={'fields': fields}, timeout=15).json()

          def fail(rec_id, status, msg):
              print(f'FEHLER: {msg}')
              at_patch(rec_id, {'Status': status, 'Letzter_Fehler': msg[:500]})
              sys.exit(1)

          print('Start | gTTS + PIL Gradient + FFmpeg')

          if FORCED_ID:
              print(f'Forced Record: {FORCED_ID}')
              r = requests.get(f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}/{FORCED_ID}',
                               headers=AT_H, timeout=10).json()
              records = [r] if r.get('id') else []
          else:
              resp = requests.get(f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}',
                                  headers=AT_H,
                                  params={'filterByFormula': '{Status}="skript_fertig"',
                                          'sort[0][field]': 'Profit_Score',
                                          'sort[0][direction]': 'desc',
                                          'maxRecords': 1},
                                  timeout=15).json()
              records = resp.get('records', [])

          if not records:
              print('Nichts zu tun -- kein skript_fertig Record.'); sys.exit(0)

          record   = records[0]
          rec_id   = record['id']
          fields   = record['fields']
          name     = fields.get('Name', 'Produkt')
          hook     = fields.get('Script_Hook', '')
          volltext = fields.get('Script_Volltext', '')
          sprache  = fields.get('Sprache', 'DE')

          print(f'Verarbeite: {rec_id} | {name[:60]} | {sprache}')
          if not volltext:
              fail(rec_id, 'fehler_voice', 'Script_Volltext ist leer')

          at_patch(rec_id, {'Status': 'video_processing'})

          # SCHRITT 1: gTTS
          print('[1/4] gTTS...')
          t0 = time.time()
          lang_map = {'DE': 'de', 'EN': 'en', 'ES': 'es', 'PT': 'pt', 'FR': 'fr', 'IT': 'it'}
          lang = lang_map.get(sprache.upper(), 'de')
          try:
              gTTS(text=volltext[:4096], lang=lang, slow=False).save('voiceover.mp3')
              print(f'TTS OK {time.time()-t0:.1f}s | {os.path.getsize("voiceover.mp3")//1024}KB')
          except Exception as e:
              fail(rec_id, 'fehler_voice', f'gTTS: {str(e)[:300]}')

          # SCHRITT 2: PIL Dark Luxury Gradient
          print('[2/4] Background (PIL Dark Gradient)...')
          W, H = 1080, 1920
          bg = Image.new('RGB', (W, H))
          draw_bg = ImageDraw.Draw(bg)
          # Verlauf: Dunkel-Navy oben -> Dunkel-Gold-Schwarz unten
          for y in range(H):
              t = y / H
              # Smooth dark gradient with warm undertones
              r = int(4 + 28 * t)
              g = int(3 + 18 * t)
              b = int(12 + 8 * t)
              draw_bg.line([(0, y), (W, y)], fill=(r, g, b))
          # Goldfarbener Lichtschein oben-mittig
          glow = Image.new('RGB', (W, H), (0, 0, 0))
          gd = ImageDraw.Draw(glow)
          gd.ellipse([W//2-350, -250, W//2+350, 450], fill=(55, 38, 5))
          glow = glow.filter(ImageFilter.GaussianBlur(100))
          bg = Image.blend(bg, glow, 0.65)
          # Dezente diagonale Lichtstreifen
          draw_bg2 = ImageDraw.Draw(bg)
          for xi, col in [(W//3, (70,50,8)), (W//2, (90,65,10)), (W*2//3, (55,40,6))]:
              draw_bg2.line([(xi, 0), (xi+200, H)], fill=col, width=2)
          bg.save('background.jpg', quality=95)
          print('Background OK (1080x1920) | PIL Gradient')

          # SCHRITT 3: Text-Overlay + FFmpeg
          print('[3/4] Text-Overlay + FFmpeg...')
          img = bg.copy()
          draw = ImageDraw.Draw(img)

          FONT_BOLD = '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf'
          try:
              f_label = ImageFont.truetype(FONT_BOLD, 38)
              f_hook  = ImageFont.truetype(FONT_BOLD, 62)
          except:
              f_label = f_hook = ImageFont.load_default()

          draw.rectangle([W-215, 22, W-12, 70], fill=(0,0,0))
          draw.text((W-208, 28), 'Werbung*', font=f_label, fill='#FFD700')

          if hook:
              lines = textwrap.wrap(hook[:160], width=22)
              line_h = 78
              block_h = len(lines) * line_h + 20
              strip_y = H - block_h - 70
              strip = Image.new('RGBA', (W, block_h + 16), (0, 0, 0, 170))
              img_rgba = img.convert('RGBA')
              img_rgba.paste(strip, (0, strip_y - 8), strip)
              img = img_rgba.convert('RGB')
              draw = ImageDraw.Draw(img)
              for i, line in enumerate(lines):
                  bbox = draw.textbbox((0, 0), line, font=f_hook)
                  tw = bbox[2] - bbox[0]
                  x = (W - tw) // 2
                  y = strip_y + i * line_h
                  for dx, dy in [(-3,-3),(3,-3),(-3,3),(3,3)]:
                      draw.text((x+dx, y+dy), line, font=f_hook, fill='black')
                  draw.text((x, y), line, font=f_hook, fill='white')

          img.save('background_overlay.jpg', quality=95)
          print('Overlay OK')

          r = subprocess.run([
              'ffmpeg', '-y',
              '-loop', '1', '-i', 'background_overlay.jpg',
              '-i', 'voiceover.mp3',
              '-vf', (
                  'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,'
                  "zoompan=z='if(eq(on,1),1.15,max(1.001,zoom-0.0008))'"
                  ":x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=1080x1920:fps=25"
              ),
              '-c:v', 'libx264', '-preset', 'fast', '-crf', '22',
              '-c:a', 'aac', '-b:a', '128k', '-movflags', '+faststart',
              '-shortest', 'output.mp4'
          ], capture_output=True, text=True)
          if r.returncode != 0:
              fail(rec_id, 'fehler_video', f'FFmpeg: {r.stderr[-400:]}')
          print(f'FFmpeg OK | {os.path.getsize("output.mp4")/1024/1024:.1f}MB')

          # SCHRITT 4: GitHub Release Upload
          print('[4/4] GitHub Release...')
          safe = ''.join(c if c.isalnum() or c=='-' else '' for c in name[:28])
          tag = f'vid-{rec_id[:8]}-{int(time.time())}'
          rel = requests.post(f'https://api.github.com/repos/{REPO}/releases',
              headers=GH_H,
              json={'tag_name': tag, 'name': f'Video: {safe}',
                    'body': rec_id, 'draft': False, 'prerelease': False},
              timeout=30)
          if rel.status_code not in (200, 201):
              fail(rec_id, 'fehler_video', f'Release HTTP {rel.status_code}: {rel.text[:200]}')
          upload_base = rel.json()['upload_url'].split('{')[0]

          def upload(path, ctype, aname):
              with open(path, 'rb') as f: data = f.read()
              r = requests.post(f'{upload_base}?name={aname}',
                  headers={'Authorization': f'token {GH_TOKEN}', 'Content-Type': ctype},
                  data=data, timeout=180)
              if r.status_code not in (200, 201):
                  raise Exception(f'{aname} HTTP {r.status_code}')
              url = r.json()['browser_download_url']
              print(f'  ok {aname}')
              return url

          video_url = upload('output.mp4',             'video/mp4',  'video.mp4')
          audio_url = upload('voiceover.mp3',          'audio/mpeg', 'voiceover.mp3')
          bg_url    = upload('background_overlay.jpg', 'image/jpeg', 'background.jpg')

          at_patch(rec_id, {
              'Status':              'video_fertig',
              'Video_URL':           video_url,
              'Voiceover_File_URL':  audio_url,
              'Video_Background_URL':bg_url,
              'Letzter_Fehler':      ''
          })
          print(f'\n=== FERTIG === Record={rec_id} Status=video_fertig')
          print(f'Video: {video_url}')
          PYEOF
