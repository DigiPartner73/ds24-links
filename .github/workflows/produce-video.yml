name: DS24 - Produce Video v6

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      record_id:
        description: 'Airtable Record ID (optional)'
        required: false
  repository_dispatch:
    types: [produce-video]

permissions:
  contents: write

concurrency:
  group: produce-video
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install deps
        run: |
          sudo apt-get install -y ffmpeg fonts-liberation
          pip install requests pillow google-genai --quiet

      - name: Produce video
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCED_RECORD_ID: ${{ github.event.client_payload.record_id || github.event.inputs.record_id || '' }}
        run: |
          python3 - << 'PYEOF'
import sys, os, time, base64, subprocess, textwrap, traceback

# Frühzeitiger Fehler-Catcher
AT_TOKEN = os.environ['AIRTABLE_TOKEN']
GH_TOKEN = os.environ['GH_TOKEN']
FORCED_ID = os.environ.get('FORCED_RECORD_ID', '').strip()
BASE_ID  = 'apppfrE10FwXz9IMY'
TABLE_ID = 'tblm1szgXQZc0mRle'
CFG_TABLE = 'tblHq1P7Z7bE7hUEj'
REPO = 'DigiPartner73/ds24-links'
AT_H = {'Authorization': f'Bearer {AT_TOKEN}', 'Content-Type': 'application/json'}
GH_H = {'Authorization': f'token {GH_TOKEN}', 'Accept': 'application/vnd.github.v3+json'}

try:
    import requests
    from PIL import Image, ImageDraw, ImageFont
    import google.genai as genai
    import google.genai.types as genai_types
except Exception as e:
    print(f'IMPORT FEHLER: {e}')
    sys.exit(1)

def get_config(key):
    try:
        r = requests.get(
            f'https://api.airtable.com/v0/{BASE_ID}/{CFG_TABLE}',
            headers=AT_H,
            params={'filterByFormula': f'{{Parameter}}="{key}"', 'maxRecords': 1},
            timeout=10
        ).json()
        recs = r.get('records', [])
        return recs[0]['fields'].get('Wert', '') if recs else ''
    except Exception as e:
        print(f'Config-Fehler ({key}): {e}')
        return ''

def at_patch(rec_id, fields):
    try:
        return requests.patch(
            f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}/{rec_id}',
            headers=AT_H, json={'fields': fields}, timeout=15
        ).json()
    except Exception as e:
        print(f'Airtable patch Fehler: {e}')
        return {}

def fail(rec_id, status, msg):
    print(f'FEHLER [{status}]: {msg}')
    at_patch(rec_id, {'Status': status, 'Letzter_Fehler': msg[:500]})
    sys.exit(1)

print('=== DS24 Produce Video v6 | ElevenLabs + Nano Banana + FFmpeg ===')

# Record laden
if FORCED_ID:
    print(f'Forced Record: {FORCED_ID}')
    r = requests.get(
        f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}/{FORCED_ID}',
        headers=AT_H, timeout=10
    ).json()
    records = [r] if r.get('id') else []
else:
    resp = requests.get(
        f'https://api.airtable.com/v0/{BASE_ID}/{TABLE_ID}',
        headers=AT_H,
        params={
            'filterByFormula': '{Status}="skript_fertig"',
            'sort[0][field]': 'Profit_Score',
            'sort[0][direction]': 'desc',
            'maxRecords': 1
        },
        timeout=15
    ).json()
    records = resp.get('records', [])

if not records:
    print('Nichts zu tun — kein skript_fertig Record.'); sys.exit(0)

record  = records[0]
rec_id  = record['id']
fields  = record['fields']
name    = fields.get('Name', 'Produkt')
hook    = fields.get('Script_Hook', '')
volltext = fields.get('Script_Volltext', '')
sprache = fields.get('Sprache', 'DE')

print(f'Verarbeite: {rec_id} | {name[:60]} | {sprache}')
if not volltext:
    fail(rec_id, 'fehler_voice', 'Script_Volltext ist leer')

at_patch(rec_id, {'Status': 'video_processing'})

# SCHRITT 1: ElevenLabs TTS
print('[1/4] ElevenLabs TTS...')
t0 = time.time()
EL_KEY      = get_config('elevenlabs_api_key')
EL_VOICE_ID = get_config('elevenlabs_voice_id') or '4RZ84U1b4WCqpu57LvIq'
if not EL_KEY:
    fail(rec_id, 'fehler_voice', 'elevenlabs_api_key fehlt in Airtable Config')

tts = requests.post(
    f'https://api.elevenlabs.io/v1/text-to-speech/{EL_VOICE_ID}',
    headers={
        'xi-api-key': EL_KEY,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
    },
    json={
        'text': volltext[:5000],
        'model_id': 'eleven_multilingual_v2',
        'voice_settings': {
            'stability': 0.5,
            'similarity_boost': 0.75
        }
    },
    timeout=120
)
if tts.status_code != 200:
    fail(rec_id, 'fehler_voice', f'ElevenLabs HTTP {tts.status_code}: {tts.text[:300]}')
with open('voiceover.mp3', 'wb') as f: f.write(tts.content)
print(f'TTS OK {time.time()-t0:.1f}s | {len(tts.content)//1024}KB')

# SCHRITT 2: Nano Banana (Gemini) 9:16 Hintergrundbild
print('[2/4] Nano Banana Hintergrundbild...')
t0 = time.time()
NB_KEY = get_config('nanobanana_api_key')
if not NB_KEY:
    fail(rec_id, 'fehler_video', 'nanobanana_api_key fehlt in Airtable Config')

try:
    nb_client = genai.Client(api_key=NB_KEY)
    img_prompt = (
        f"Professional dark luxury background for digital product '{name}'. "
        "Cinematic lighting, subtle golden color accent, abstract premium feel. "
        "No text, no logos, no people, no faces. "
        "Vertical format 9:16 for Instagram Reels. Ultra high quality, photorealistic."
    )
    nb_resp = nb_client.models.generate_content(
        model='gemini-3.1-flash-image-preview',
        contents=img_prompt,
        config=genai_types.GenerateContentConfig(
            response_modalities=['image'],
            image_generation_config=genai_types.ImageGenerationConfig(
                aspect_ratio='9:16',
                number_of_images=1
            )
        )
    )
    img_bytes = None
    for part in nb_resp.candidates[0].content.parts:
        if part.inline_data:
            img_bytes = base64.b64decode(part.inline_data.data)
            break
    if not img_bytes:
        fail(rec_id, 'fehler_video', 'Nano Banana: keine Bild-Daten in Response')
    with open('background.jpg', 'wb') as f: f.write(img_bytes)
    print(f'Nano Banana OK {time.time()-t0:.1f}s | {len(img_bytes)//1024}KB')
except Exception as e:
    fail(rec_id, 'fehler_video', f'Nano Banana Fehler: {traceback.format_exc()[-400:]}')

# SCHRITT 3: Pillow Text-Overlay
print('[3/4] Text-Overlay + FFmpeg...')
img = Image.open('background.jpg').convert('RGB').resize((1080, 1920), Image.LANCZOS)
W, H = 1080, 1920
draw = ImageDraw.Draw(img)

FONT_BOLD = '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf'
try:
    f_label = ImageFont.truetype(FONT_BOLD, 38)
    f_hook  = ImageFont.truetype(FONT_BOLD, 62)
except Exception:
    f_label = f_hook = ImageFont.load_default()

# "Werbung*" Badge oben rechts
draw.rectangle([W-215, 22, W-12, 70], fill=(0,0,0))
draw.text((W-208, 28), 'Werbung*', font=f_label, fill='#FFD700')

# Hook-Text unten
if hook:
    lines = textwrap.wrap(hook[:160], width=22)
    line_h = 78
    block_h = len(lines) * line_h + 20
    strip_y = H - block_h - 70
    strip = Image.new('RGBA', (W, block_h + 16), (0, 0, 0, 170))
    img_rgba = img.convert('RGBA')
    img_rgba.paste(strip, (0, strip_y - 8), strip)
    img = img_rgba.convert('RGB')
    draw = ImageDraw.Draw(img)
    for i, line in enumerate(lines):
        bbox = draw.textbbox((0, 0), line, font=f_hook)
        tw = bbox[2] - bbox[0]
        x = (W - tw) // 2
        y = strip_y + i * line_h
        for dx, dy in [(-3,-3),(3,-3),(-3,3),(3,3)]:
            draw.text((x+dx, y+dy), line, font=f_hook, fill='black')
        draw.text((x, y), line, font=f_hook, fill='white')

img.save('background_overlay.jpg', quality=95)
print('Overlay OK')

# FFmpeg Ken Burns
r = subprocess.run([
    'ffmpeg', '-y',
    '-loop', '1', '-i', 'background_overlay.jpg',
    '-i', 'voiceover.mp3',
    '-vf', (
        'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,'
        "zoompan=z='if(eq(on,1),1.15,max(1.001,zoom-0.0008))'"
        ":x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=1080x1920:fps=25"
    ),
    '-c:v', 'libx264', '-preset', 'fast', '-crf', '22',
    '-c:a', 'aac', '-b:a', '128k', '-movflags', '+faststart',
    '-shortest', 'output.mp4'
], capture_output=True, text=True)
if r.returncode != 0:
    fail(rec_id, 'fehler_video', f'FFmpeg: {r.stderr[-400:]}')
print(f'FFmpeg OK | {os.path.getsize("output.mp4")/1024/1024:.1f}MB')

# SCHRITT 4: GitHub Release Upload
print('[4/4] GitHub Release...')
safe = ''.join(c if c.isalnum() or c=='-' else '' for c in name[:28])
tag  = f'vid-{rec_id[:8]}-{int(time.time())}'
rel  = requests.post(
    f'https://api.github.com/repos/{REPO}/releases',
    headers=GH_H,
    json={'tag_name': tag, 'name': f'Video: {safe}',
          'body': rec_id, 'draft': False, 'prerelease': False},
    timeout=30
)
if rel.status_code not in (200, 201):
    fail(rec_id, 'fehler_video', f'Release HTTP {rel.status_code}: {rel.text[:200]}')
upload_base = rel.json()['upload_url'].split('{')[0]

def upload(path, ctype, aname):
    with open(path, 'rb') as f: data = f.read()
    r = requests.post(
        f'{upload_base}?name={aname}',
        headers={'Authorization': f'token {GH_TOKEN}', 'Content-Type': ctype},
        data=data, timeout=180
    )
    if r.status_code not in (200, 201):
        raise Exception(f'{aname} HTTP {r.status_code}')
    url = r.json()['browser_download_url']
    print(f'  ok {aname}')
    return url

try:
    video_url = upload('output.mp4',              'video/mp4',   'video.mp4')
    audio_url = upload('voiceover.mp3',           'audio/mpeg',  'voiceover.mp3')
    bg_url    = upload('background_overlay.jpg',  'image/jpeg',  'background.jpg')
except Exception as e:
    fail(rec_id, 'fehler_video', f'Upload Fehler: {e}')

at_patch(rec_id, {
    'Status':               'video_fertig',
    'Video_URL':            video_url,
    'Voiceover_File_URL':   audio_url,
    'Video_Background_URL': bg_url,
    'Letzter_Fehler':       ''
})
print(f'\n=== FERTIG === RecID={rec_id} Status=video_fertig')
print(f'Video: {video_url}')
PYEOF
