name: Hotmart Scout PT

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Hotmart PT Best Sellers and Push to Make.com
        run: |
          node << 'NODEEOF'
          const https = require('https');

          const fetchPage = (url) => new Promise((resolve, reject) => {
            https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0 (compatible; bot)' } }, (res) => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => resolve({ status: res.statusCode, body: data }));
            }).on('error', reject);
          });

          const postJson = (hostname, path, payload) => new Promise((resolve, reject) => {
            const body = JSON.stringify(payload);
            const req = https.request({
              hostname, path, method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
            }, (res) => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => resolve({ status: res.statusCode, body: d }));
            });
            req.on('error', reject);
            req.write(body);
            req.end();
          });

          const extractProducts = (html, source) => {
            const match = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
            if (!match) { console.log('No __NEXT_DATA__ in', source); return []; }
            try {
              const data = JSON.parse(match[1]);
              const bs = data.props?.pageProps?.bestSellers || [];
              console.log(source + ': found', bs.length, 'products');
              return bs;
            } catch(e) {
              console.log('Parse error for', source, ':', e.message);
              return [];
            }
          };

          (async () => {
            const urls = [
              'https://hotmart.com/pt-br/marketplace?language=PT&type=ALL&orderby=RELEVANCE',
              'https://hotmart.com/pt-br/marketplace?language=PT&type=ONLINE_COURSE&orderby=RELEVANCE',
              'https://hotmart.com/pt-br/marketplace?language=PT&type=EBOOK&orderby=RELEVANCE',
            ];

            const seen = new Set();
            const allProducts = [];

            for (const url of urls) {
              try {
                const r = await fetchPage(url);
                console.log(url.split('?')[1], '-> status:', r.status);
                const products = extractProducts(r.body, url.includes('COURSE') ? 'COURSE' : url.includes('EBOOK') ? 'EBOOK' : 'ALL');
                for (const p of products) {
                  if (!seen.has(p.slug)) {
                    seen.add(p.slug);
                    allProducts.push({
                      title: (p.title || '').trim(),
                      slug: p.slug || '',
                      description: (p.description || '').slice(0, 500),
                      category: p.category || '',
                      offer: p.offer || '',
                      producerReferenceCode: p.producerReferenceCode || '',
                      ownerName: p.ownerName || p.authorName || ''
                    });
                  }
                }
              } catch(e) {
                console.log('Error fetching:', e.message);
              }
              await new Promise(r => setTimeout(r, 1000));
            }

            console.log('Total unique PT products:', allProducts.length);
            if (!allProducts.length) { console.log('No products found. Exiting.'); process.exit(0); }

            const resp = await postJson(
              'hook.eu1.make.com',
              '/v4ip9llqbyzz1te9tfnehskaxoyuslju',
              { products: allProducts }
            );
            console.log('Make.com:', resp.status, resp.body);
          })();
          NODEEOF
