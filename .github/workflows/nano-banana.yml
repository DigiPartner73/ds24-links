name: Nano Banana Video Generator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: nano-banana-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate clips and render videos
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import sys
          import time

          # ── v5: Pexels stock videos instead of NB API ────────────────────────
          # Root cause analysis: NB API holds connections for ~375s then returns 429.
          # This happens on every single run regardless of rate limit resets.
          # NB is too slow/overloaded for our use case (4 clips × 375s = 25 min/product).
          # Pexels: free, instant (<1s per clip), reliable, no rate limits for our volume.
          # Pexels video files are direct CDN links — JSON2Video downloads & renders them.

          AT_TOKEN = os.environ['AIRTABLE_TOKEN']
          BASE_ID = 'apppfrE10FwXz9IMY'
          TABLE_ID = 'tblm1szgXQZc0mRle'
          CONFIG_TABLE = 'tblHq1P7Z7bE7hUEj'
          AT_HEADERS = {'Authorization': f'Bearer {AT_TOKEN}', 'Content-Type': 'application/json'}

          def at_get(table, params):
              return requests.get(f'https://api.airtable.com/v0/{BASE_ID}/{table}',
                  headers=AT_HEADERS, params=params).json()

          def at_patch(record_id, fields, table=None):
              tbl = table or TABLE_ID
              return requests.patch(f'https://api.airtable.com/v0/{BASE_ID}/{tbl}/{record_id}',
                  headers=AT_HEADERS, json={'fields': fields}).json()

          def get_config(key):
              r = at_get(CONFIG_TABLE, {'filterByFormula': f'{{Parameter}}="{key}"', 'maxRecords': 1})
              recs = r.get('records', [])
              return recs[0]['fields'].get('Wert', '') if recs else ''

          PEXELS_KEY = get_config('pexels_api_key')
          J2V_API_KEY = get_config('json2video_api_key')
          if not PEXELS_KEY: print('ERROR: pexels_api_key missing'); sys.exit(1)
          if not J2V_API_KEY: print('ERROR: json2video_api_key missing'); sys.exit(1)
          print(f'Keys loaded: Pexels={PEXELS_KEY[:8]}... J2V={J2V_API_KEY[:8]}...')
          print(f'Engine: Pexels stock videos (v5)')

          # ── Find record to process ────────────────────────────────────────────
          resp = at_get(TABLE_ID, {'filterByFormula': '{Status}="clips_rendering"', 'maxRecords': 1})
          records = resp.get('records', [])
          if not records:
              print('Nothing to do.'); sys.exit(0)

          record = records[0]
          record_id = record['id']
          fields = record['fields']
          print(f'Processing: {record_id} ({fields.get("Produktname","?")[:50]})')

          # Lock immediately to prevent concurrent processing
          at_patch(record_id, {'Status': 'nb_processing'})

          vo_a = fields.get('Voiceover_DL_A', '')
          vo_b = fields.get('Voiceover_DL_B', '')
          vo_c = fields.get('Voiceover_DL_C', '')
          if not all([vo_a, vo_b, vo_c]):
              print(f'ERROR: Missing voiceover DL URLs A={bool(vo_a)} B={bool(vo_b)} C={bool(vo_c)}')
              at_patch(record_id, {'Status': 'fehler_clip'}); sys.exit(1)
          print(f'Voiceover DL URLs OK')

          base_q = fields.get('Pexels_Query', '') or 'cinematic lifestyle'
          queries = [
              fields.get('Pexels_Query') or base_q,
              fields.get('Pexels_Query_2') or (base_q + ' close detail'),
              fields.get('Pexels_Query_3') or (base_q + ' wide shot'),
              fields.get('Pexels_Query_4') or (base_q + ' slow motion'),
          ]
          print(f'Queries: {[q[:55] for q in queries]}')

          # ── Pexels video fetch ────────────────────────────────────────────────
          # Authorization: Raw key, NO "Bearer" prefix (Bug #3 in preferences)
          PEXELS_HEADERS = {'Authorization': PEXELS_KEY}

          def get_pexels_clip(query, clip_num):
              print(f'[{time.strftime("%H:%M:%S")}] Clip {clip_num}/4: Pexels "{query[:45]}"...')
              # Attempt 1: portrait orientation, large size
              # Attempt 2: fallback without orientation (broader results)
              for attempt, params in enumerate([
                  {'query': query, 'orientation': 'portrait', 'size': 'large', 'per_page': 5},
                  {'query': query.split(',')[0].strip(), 'per_page': 5},
              ]):
                  try:
                      r = requests.get('https://api.pexels.com/videos/search',
                          headers=PEXELS_HEADERS, params=params, timeout=15)
                      if r.status_code != 200:
                          print(f'Pexels HTTP {r.status_code} attempt {attempt+1}: {r.text[:150]}')
                          continue
                      videos = r.json().get('videos', [])
                      if not videos:
                          print(f'No results attempt {attempt+1} for "{params["query"][:40]}"')
                          continue
                      # Prefer highest resolution file (largest height)
                      video = videos[0]
                      files = sorted(video.get('video_files', []),
                                     key=lambda f: f.get('height', 0), reverse=True)
                      if not files:
                          print(f'No video_files in result for clip {clip_num}')
                          continue
                      url = files[0]['link']
                      w = files[0].get('width', '?')
                      h = files[0].get('height', '?')
                      print(f'Clip {clip_num} OK ({w}x{h}): {url[:70]}')
                      return url
                  except Exception as e:
                      print(f'Pexels error clip {clip_num} attempt {attempt+1}: {e}')
                      continue
              print(f'ERROR: Could not fetch clip {clip_num} for "{query[:45]}"')
              return None

          clips = []
          for i, query in enumerate(queries):
              url = get_pexels_clip(query, i + 1)
              if not url:
                  at_patch(record_id, {'Status': 'fehler_clip'}); sys.exit(1)
              clips.append(url)
              time.sleep(0.3)  # Gentle pacing for Pexels API

          print(f'All 4 clips fetched from Pexels')

          # ── Submit 3 JSON2Video renders (A, B, C variants) ────────────────────
          J2V_HEADERS = {'x-api-key': J2V_API_KEY, 'Content-Type': 'application/json'}

          def make_scene(clip_url):
              return {
                  'background-color': '#000000',
                  'duration': -1,
                  'elements': [{
                      'type': 'video',
                      'src': clip_url,
                      'width': 1080, 'height': 1920,
                      'x': 0, 'y': 0,
                      'loop': -1, 'duration': -2
                  }]
              }

          def submit_j2v(audio_url, variant):
              print(f'[{time.strftime("%H:%M:%S")}] Submitting JSON2Video variant {variant}...')
              body = {
                  'width': 1080, 'height': 1920, 'quality': 'high',
                  'elements': [
                      {
                          'type': 'subtitles',
                          'language': 'de',
                          'settings': {
                              'style': 'classic',
                              'font-family': 'Montserrat',
                              'font-size': '80',
                              'font-weight': '700',
                              'word-color': '#FFD700',
                              'line-color': '#FFFFFF',
                              'outline-color': '#000000',
                              'outline-width': 6,
                              'max-words-per-line': 3,
                              'position': 'bottom-center'
                          }
                      },
                      {'type': 'audio', 'src': audio_url}
                  ],
                  'scenes': [make_scene(c) for c in clips]
              }
              try:
                  r = requests.post('https://api.json2video.com/v2/movies',
                      headers=J2V_HEADERS, json=body, timeout=30).json()
                  pid = r.get('project', '')
                  if pid:
                      print(f'Variant {variant}: project_id={pid}')
                  else:
                      print(f'Variant {variant}: NO project_id! Response: {r}')
                  return pid
              except Exception as e:
                  print(f'J2V submit error variant {variant}: {e}')
                  return ''

          project_a = submit_j2v(vo_a, 'A')
          project_b = submit_j2v(vo_b, 'B')
          project_c = submit_j2v(vo_c, 'C')

          if not project_c:
              print(f'ERROR: J2V submission failed. A={project_a} B={project_b} C={project_c}')
              at_patch(record_id, {'Status': 'fehler_video'}); sys.exit(1)

          update_fields = {
              'Status': 'video_rendering',
              'JSON2Video_ID': project_c,
          }
          if project_a:
              update_fields['JSON2Video_ID_A'] = project_a
          if project_b:
              update_fields['JSON2Video_ID_B'] = project_b

          result = at_patch(record_id, update_fields)
          rec_id_out = result.get('id', 'ERROR')
          print(f'SUCCESS! Record={rec_id_out} Status=video_rendering')
          print(f'J2V IDs: A={project_a} B={project_b} C={project_c}')
          PYEOF
